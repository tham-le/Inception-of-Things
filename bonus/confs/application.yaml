apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wil42
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "http://gitlab-webservice-default.gitlab.svc.cluster.local:8181/root/wil42-config.git"
    targetRevision: HEAD
    path: manifests/
  destination:
    server: "https://kubernetes.default.svc"
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
  ignoreDifferences:
  - group: ""
    kind: "Endpoints"
    jsonPointers:
    - /subsets